version: '3.8'

services:
  ebay-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ebay-mcp-server
    restart: unless-stopped
    command: pnpm run start:http
    env_file:
      - .env
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch(`http://127.0.0.1:${process.env.PORT || 3000}/health`).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
    networks:
      - ebay-mcp-network

networks:
  ebay-mcp-network:
    driver: bridge
