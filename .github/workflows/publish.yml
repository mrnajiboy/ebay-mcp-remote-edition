name: Build & Verify Release

# Note: npm publishing is intentionally disabled out of respect for the original creator.
# Releases are created automatically via release-please.yml on main branch pushes.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-and-verify:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la build/
          echo "Entry point exists:"
          test -f build/index.js && echo "✓ build/index.js" || echo "✗ build/index.js MISSING"
          test -f build/server-http.js && echo "✓ build/server-http.js" || echo "✗ build/server-http.js MISSING"
