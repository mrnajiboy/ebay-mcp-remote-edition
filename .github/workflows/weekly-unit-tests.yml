name: Weekly Unit Tests

on:
  workflow_dispatch: # Manual trigger
  schedule:
    # Runs every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test
